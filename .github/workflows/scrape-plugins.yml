name: Scrape KOReader plugins and patches

on:
  schedule:
    # Every six hours.
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run plugin scraper
        id: scrape_plugins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/scrape_koplugins.py

      - name: Run patch scraper
        id: scrape_patches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/scrape_kopatches.py

      - name: Merge scraper outputs
        id: scrape
        env:
          PLUGIN_ADDED: ${{ steps.scrape_plugins.outputs.added }}
          PLUGIN_UPDATED: ${{ steps.scrape_plugins.outputs.updated }}
          PATCH_ADDED: ${{ steps.scrape_patches.outputs.added }}
          PATCH_UPDATED: ${{ steps.scrape_patches.outputs.updated }}
        run: |
          set -eu
          python3 -c 'import json, os; loads=lambda n: json.loads(os.environ.get(n) or "[]"); added=loads("PLUGIN_ADDED")+loads("PATCH_ADDED"); updated=loads("PLUGIN_UPDATED")+loads("PATCH_UPDATED"); fh=open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8"); fh.write(f"added_count={len(added)}\nadded={json.dumps(added)}\nupdated_count={len(updated)}\nupdated={json.dumps(updated)}\n"); fh.close()'

      - name: Regenerate and validate manifest
        run: |
          set -eu
          sh generate-manifest.sh
          jq empty manifest.json
          meta_count="$(find packages -name '.meta' | wc -l | tr -d ' ')"
          package_count="$(jq '.packages | length' manifest.json)"
          test "$meta_count" = "$package_count"

      - name: Commit refreshed metadata and READMEs
        if: ${{ steps.scrape.outputs.updated_count != '0' }}
        env:
          UPDATED: ${{ steps.scrape.outputs.updated }}
        run: |
          set -eu
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          printf '%s' "$UPDATED" | python3 -c 'import json, sys; [print(path) for package in json.load(sys.stdin) for path in (package["path"], package.get("readme_path")) if path]' > /tmp/updated-paths.txt

          git add --pathspec-from-file=/tmp/updated-paths.txt
          if git diff --cached --quiet; then
              echo "No refreshed metadata changes to commit."
              exit 0
          fi

          git commit -m "Refresh scraped KOReader package metadata and READMEs"
          git push origin HEAD:main
          git fetch origin main

      - name: Open a PR for each new package
        if: ${{ steps.scrape.outputs.added_count != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADDED: ${{ steps.scrape.outputs.added }}
        run: |
          set -eu
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Keep new-package PR branches limited to their package metadata and manifest.
          git restore -- .github/scripts/plugin_categories.json

          # Preserve all generated packages, then remove them from the worktree so
          # each PR manifest contains only the package that PR introduces.
          snapshot_dir="$(mktemp -d)"
          printf '%s' "$ADDED" | SNAPSHOT_DIR="$snapshot_dir" python3 -c 'import json, os, shutil, sys; packages=json.load(sys.stdin); snapshot=os.environ["SNAPSHOT_DIR"]; [shutil.copytree(os.path.dirname(package["path"]), os.path.join(snapshot, str(index))) for index, package in enumerate(packages)]'
          printf '%s' "$ADDED" | python3 -c 'import json, os, sys; [print(os.path.dirname(package["path"])) for package in json.load(sys.stdin)]' > /tmp/added-dirs.txt
          while IFS= read -r dir; do
            [ -z "$dir" ] || git clean -fd -- "$dir"
          done < /tmp/added-dirs.txt

          # Each element of $ADDED is a package summary object. Emit TSV lines.
          printf '%s' "$ADDED" | python3 -c 'import json, sys; [print("\t".join([str(index), p["id"], p["name"], p.get("kind", "plugin"), p["path"], p.get("readme_path", ""), p["repo"], p["url"], str(p["stars"]), p["version"], str(p.get("assets", 0))])) for index, p in enumerate(json.load(sys.stdin))]' > /tmp/added.tsv

          while IFS="$(printf '\t')" read -r index id name kind meta readme repo url stars version assets; do
              [ -n "$id" ] || continue
              branch="scrape/${kind}/${id}"

              git checkout -B "$branch" origin/main
              mkdir -p "$(dirname "$meta")"
              cp -R "$snapshot_dir/$index/." "$(dirname "$meta")"
              git add "$meta"
              [ -z "$readme" ] || git add "$readme"
              sh generate-manifest.sh
              jq empty manifest.json
              git add manifest.json
              git commit -m "Add ${name} KOReader ${kind}"
              git push -f origin "$branch"

              gh pr create \
                  --base main \
                  --head "$branch" \
                  --title "Add ${name} KOReader ${kind}" \
                  --body "$(printf 'Auto-discovered KOReader %s.\n\n- Repo: %s\n- Stars: %s\n- Version: %s\n- Assets: %s\n\nGenerated by the KOReader package scrapers.' "$kind" "$url" "$stars" "$version" "$assets")" \
                  || echo "PR for $branch may already exist; skipping."
          done < /tmp/added.tsv

      - name: Commit regenerated manifest for refreshed packages
        if: ${{ steps.scrape.outputs.updated_count != '0' }}
        run: |
          set -eu
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B main origin/main
          sh generate-manifest.sh
          jq empty manifest.json
          git add manifest.json
          if git diff --cached --quiet; then
              echo "Manifest is already current."
              exit 0
          fi

          git commit -m "Regenerate package manifest"
          git push origin HEAD:main
