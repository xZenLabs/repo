name: Scrape KOReader plugins

on:
  schedule:
    # Bi-weekly: 1st and 15th of each month at 06:00 UTC.
    - cron: '0 6 1,15 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run scraper
        id: scrape
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/scrape_koplugins.py

      - name: Open a PR for each new plugin
        if: ${{ steps.scrape.outputs.added_count != '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ADDED: ${{ steps.scrape.outputs.added }}
        run: |
          set -eu
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Each element of $ADDED is a plugin summary object. Emit TSV lines.
          printf '%s' "$ADDED" | python3 -c '
          import json, sys
          for p in json.load(sys.stdin):
              print("\t".join([
                  p["id"], p["name"], p["repo"], p["url"],
                  str(p["stars"]), p["version"], str(p.get("assets", 0)),
              ]))
          ' > /tmp/added.tsv

          while IFS="$(printf '\t')" read -r id name repo url stars version assets; do
              [ -n "$id" ] || continue
              meta="packages/koreader/${id}.koplugin/.meta"
              [ -f "$meta" ] || continue
              branch="scrape/${id}"

              git checkout -B "$branch" origin/main
              git add "$meta"
              git commit -m "Add ${name} koplugin"
              git push -f origin "$branch"

              gh pr create \
                  --base main \
                  --head "$branch" \
                  --title "Add ${name} koplugin" \
                  --body "$(printf 'Auto-discovered KOReader plugin.\n\n- Repo: %s\n- Stars: %s\n- Version: %s\n- Release assets: %s\n\nGenerated by `.github/scripts/scrape_koplugins.py`.' "$url" "$stars" "$version" "$assets")" \
                  || echo "PR for $branch may already exist; skipping."
          done < /tmp/added.tsv
